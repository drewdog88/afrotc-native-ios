{% extends "base.html" %}

{% block title %}Add Recruit - AFROTC 695{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Add New Potential Recruit</h1>
    <a href="{{ url_for('recruits') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left"></i> Back to Recruits
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
    
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="first_name" class="form-label">First Name *</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="last_name" class="form-label">Last Name *</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="current_school" class="form-label">Current School *</label>
                    <input type="text" class="form-control" id="current_school" name="current_school" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="school_type" class="form-label">School Type *</label>
                    <select class="form-select" id="school_type" name="school_type" required>
                        <option value="">Select type...</option>
                        <option value="high_school">High School</option>
                        <option value="college">College/University</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="major" class="form-label">Major/Intended Major</label>
                    <input type="text" class="form-control" id="major" name="major">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="status" class="form-label">Recruitment Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="prospective">Prospective</option>
                        <option value="contacted">Contacted</option>
                        <option value="interested">Interested</option>
                        <option value="applied">Applied</option>
                        <option value="enrolled">Enrolled</option>
                        <option value="not_interested">Not Interested</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="high_school_graduation_year" class="form-label">High School Graduation Year</label>
                    <input type="number" class="form-control" id="high_school_graduation_year" name="high_school_graduation_year" min="2020" max="2030">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="expected_college_graduation_year" class="form-label">Expected College Graduation Year</label>
                    <input type="number" class="form-control" id="expected_college_graduation_year" name="expected_college_graduation_year" min="2024" max="2035">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="gpa" class="form-label">GPA</label>
                    <input type="number" class="form-control" id="gpa" name="gpa" step="0.01" min="0" max="4.0">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="sat_score" class="form-label">SAT Score</label>
                    <input type="number" class="form-control" id="sat_score" name="sat_score" min="400" max="1600">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="act_score" class="form-label">ACT Score</label>
                    <input type="number" class="form-control" id="act_score" name="act_score" min="1" max="36">
                </div>
            </div>

            <div class="mb-3">
                <label for="interests" class="form-label">Interests</label>
                <textarea class="form-control" id="interests" name="interests" rows="3" placeholder="What are they interested in? (e.g., aviation, engineering, leadership)"></textarea>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Additional notes about this recruit..."></textarea>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('recruits') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Recruit
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
