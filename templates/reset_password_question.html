{% extends "base.html" %}

{% block title %}Reset Password - AFROTC 695{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="logo-container">
            <img src="https://www.up.edu/afrotc/images/det-695-full-color-patch.png" alt="AFROTC 695 Logo">
            <h4 class="mt-3 text-center">Reset Password</h4>
        </div>
        
        <p class="text-center mb-3">Please answer your security question:</p>
        <p class="text-center text-muted mb-4"><strong>{{ user.secret_question }}</strong></p>
        
        <form method="POST">
    
            <div class="mb-3">
                <label for="secret_answer" class="form-label">Your Answer</label>
                <input type="text" class="form-control" id="secret_answer" name="secret_answer" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>

        <div class="mt-3 text-center">
            <a href="/login" class="text-decoration-none">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
