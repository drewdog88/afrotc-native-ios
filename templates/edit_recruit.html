{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Edit Recruit</h2>
    <form method="POST">
    
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" value="{{ recruit.first_name }}" required>
                </div>
                <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" value="{{ recruit.last_name }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ recruit.email }}">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone" value="{{ recruit.phone }}">
                </div>
                <div class="mb-3">
                    <label for="major" class="form-label">Major</label>
                    <input type="text" class="form-control" id="major" name="major" value="{{ recruit.major }}">
                </div>
                <div class="mb-3">
                    <label for="current_school" class="form-label">Current School</label>
                    <input type="text" class="form-control" id="current_school" name="current_school" value="{{ recruit.current_school }}" required>
                </div>
                <div class="mb-3">
                    <label for="school_type" class="form-label">School Type</label>
                    <select class="form-select" id="school_type" name="school_type" required>
                        <option value="high_school" {% if recruit.school_type == 'high_school' %}selected{% endif %}>High School</option>
                        <option value="college" {% if recruit.school_type == 'college' %}selected{% endif %}>College</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="high_school_graduation_year" class="form-label">High School Graduation Year</label>
                    <input type="number" class="form-control" id="high_school_graduation_year" name="high_school_graduation_year" value="{{ recruit.high_school_graduation_year }}">
                </div>
                <div class="mb-3">
                    <label for="expected_college_graduation_year" class="form-label">Expected College Graduation Year</label>
                    <input type="number" class="form-control" id="expected_college_graduation_year" name="expected_college_graduation_year" value="{{ recruit.expected_college_graduation_year }}">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="gpa" class="form-label">GPA</label>
                    <input type="number" step="0.01" class="form-control" id="gpa" name="gpa" value="{{ recruit.gpa }}">
                </div>
                <div class="mb-3">
                    <label for="sat_score" class="form-label">SAT Score</label>
                    <input type="number" class="form-control" id="sat_score" name="sat_score" value="{{ recruit.sat_score }}">
                </div>
                <div class="mb-3">
                    <label for="act_score" class="form-label">ACT Score</label>
                    <input type="number" class="form-control" id="act_score" name="act_score" value="{{ recruit.act_score }}">
                </div>
                <div class="mb-3">
                    <label for="interests" class="form-label">Interests</label>
                    <textarea class="form-control" id="interests" name="interests">{{ recruit.interests }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="notes" class="form-label">Notes</label>
                    <textarea class="form-control" id="notes" name="notes">{{ recruit.notes }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status" required>
                        <option value="prospective" {% if recruit.status == 'prospective' %}selected{% endif %}>Prospective</option>
                        <option value="contacted" {% if recruit.status == 'contacted' %}selected{% endif %}>Contacted</option>
                        <option value="interested" {% if recruit.status == 'interested' %}selected{% endif %}>Interested</option>
                        <option value="applied" {% if recruit.status == 'applied' %}selected{% endif %}>Applied</option>
                        <option value="enrolled" {% if recruit.status == 'enrolled' %}selected{% endif %}>Enrolled</option>
                        <option value="not_interested" {% if recruit.status == 'not_interested' %}selected{% endif %}>Not Interested</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Update Recruit</button>
        <a href="{{ url_for('recruits') }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
