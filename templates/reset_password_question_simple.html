<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Reset Password - AFROTC 695</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="page-reset-password-question">
    <div class="login-container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a8a, #3b82f6);">
        <div class="login-card" style="background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 40px; max-width: 400px; width: 100%;">
            <div class="logo-container" style="text-align: center; margin-bottom: 30px;">
                <img src="https://www.up.edu/afrotc/images/det-695-full-color-patch.png" alt="AFROTC 695 Logo" style="height: 80px; width: auto;">
                <h4 class="mt-3 text-center">Reset Password</h4>
            </div>
            
            <p class="text-center mb-3">Please answer your security question:</p>
            <p class="text-center text-muted mb-4"><strong>{{ user.secret_question }}</strong></p>
            
            <form method="POST">
    
                <div class="mb-3">
                    <label for="secret_answer" class="form-label">Your Answer</label>
                    <input type="text" class="form-control" id="secret_answer" name="secret_answer" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>

            <div class="mt-3 text-center">
                <a href="/login" class="text-decoration-none">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
