{% extends "base.html" %}

{% block title %}Login - AFROTC 695{% endblock %}

{% block login_content %}
<form method="POST">
    
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign In</button>
</form>

<div class="mt-3 text-center">
    <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">
        <i class="fas fa-key"></i> Forgot Password?
    </a>
</div>

<div class="mt-4 text-center">
    <small class="text-muted">
        <strong>Default Credentials:</strong><br>
        Username: admin<br>
        Password: admin123<br>
        <span class="text-warning">⚠️ Change these credentials immediately after first login!</span>
    </small>
</div>

<div class="mt-4 text-center">
    <small class="text-muted">
        AFROTC Detachment 695 - University of Portland
    </small>
</div>
{% endblock %}
