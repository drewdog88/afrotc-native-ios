{% extends "base.html" %}

{% block title %}Add User - AFROTC 695{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Add User</h1>
    <a href="{{ url_for('user_management') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Users
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">User Information</h5>
            </div>
            <div class="card-body">
                <form method="POST" id="addUserForm">
    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" 
                                   value="{{ request.form.get('first_name', '') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name *</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" 
                                   value="{{ request.form.get('last_name', '') }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   value="{{ request.form.get('username', '') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ request.form.get('email', '') }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   value="{{ request.form.get('phone', '') }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="role" class="form-label">Role *</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="">Select Role</option>
                                <option value="admin" {{ 'selected' if request.form.get('role') == 'admin' }}>Admin</option>
                                <option value="recruiter" {{ 'selected' if request.form.get('role') == 'recruiter' }}>Recruiter</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <div class="mt-2">
                                <div class="progress" style="height: 5px;">
                                    <div id="password-strength" class="progress-bar" role="progressbar" style="width: 0%"></div>
                                </div>
                                <small class="text-muted" id="password-feedback"></small>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password *</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="secret_question" class="form-label">Secret Question *</label>
                            <input type="text" class="form-control" id="secret_question" name="secret_question" 
                                   value="{{ request.form.get('secret_question', '') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="secret_answer" class="form-label">Secret Answer *</label>
                            <input type="text" class="form-control" id="secret_answer" name="secret_answer" 
                                   value="{{ request.form.get('secret_answer', '') }}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('user_management') }}" class="btn btn-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const strengthBar = document.getElementById('password-strength');
    const feedback = document.getElementById('password-feedback');
    const form = document.getElementById('addUserForm');

    function updatePasswordStrength(password) {
        let strength = 0;
        let feedbackText = '';

        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

        const percentage = (strength / 5) * 100;
        strengthBar.style.width = percentage + '%';

        if (strength === 0) {
            strengthBar.className = 'progress-bar bg-danger';
            feedbackText = 'Very weak';
        } else if (strength === 1) {
            strengthBar.className = 'progress-bar bg-danger';
            feedbackText = 'Weak';
        } else if (strength === 2) {
            strengthBar.className = 'progress-bar bg-warning';
            feedbackText = 'Fair';
        } else if (strength === 3) {
            strengthBar.className = 'progress-bar bg-info';
            feedbackText = 'Good';
        } else if (strength === 4) {
            strengthBar.className = 'progress-bar bg-primary';
            feedbackText = 'Strong';
        } else {
            strengthBar.className = 'progress-bar bg-success';
            feedbackText = 'Very strong';
        }

        feedback.textContent = feedbackText;
    }

    passwordInput.addEventListener('input', function() {
        updatePasswordStrength(this.value);
    });

    form.addEventListener('submit', function(e) {
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match!');
            return;
        }

        if (password.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters long!');
            return;
        }

        if (!/[A-Z]/.test(password)) {
            e.preventDefault();
            alert('Password must contain at least one uppercase letter!');
            return;
        }

        if (!/[a-z]/.test(password)) {
            e.preventDefault();
            alert('Password must contain at least one lowercase letter!');
            return;
        }

        if (!/[0-9]/.test(password)) {
            e.preventDefault();
            alert('Password must contain at least one number!');
            return;
        }

        if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
            e.preventDefault();
            alert('Password must contain at least one special character!');
            return;
        }
    });
});
</script>
{% endblock %}
