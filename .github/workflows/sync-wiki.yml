name: Sync Wiki

# The wiki source of truth is the version-controlled wiki/ directory. On any push
# to main that touches it, mirror those pages into the GitHub Wiki (.wiki.git) so
# the two never drift. The wiki can still be edited in the browser, but wiki/ wins
# on the next push.

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-wiki
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Push wiki/ contents to the GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" wiki_repo
          # Replace all pages with the repo's wiki/ contents (keep .git).
          find wiki_repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp wiki/*.md wiki_repo/
          cd wiki_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "Sync wiki from ${SHA}"
            git push origin HEAD
          fi
